{% load static %}
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Password Reset Complete</title>
        <link rel="stylesheet" href="{% static 'css/login.css' %}">
        <link rel="stylesheet" href="{% static 'css/password_reset.css' %}">
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <style>
            .message-card {
                width: 100%;
                max-width: 440px;
                background: #ffffff;
                border-radius: 24px;
                padding: 36px;
                box-shadow: 0 24px 56px rgba(0, 0, 0, 0.12);
                text-align: center;
            }
            .message-card h1 {
                font-family: 'Fraunces', serif;
                font-size: 32px;
                margin-bottom: 16px;
            }
            .message-card p {
                font-size: 16px;
                color: #5c5f66;
                line-height: 1.75;
                margin-bottom: 28px;
            }
            .message-card .submit-btn {
                width: 100%;
                padding: 14px 18px;
                border-radius: 14px;
                border: none;
                background: #4a6741;
                color: #fff;
                font-weight: 600;
                text-decoration: none;
                display: inline-flex;
                justify-content: center;
                transition: background 0.2s ease, transform 0.2s ease;
            }
            .message-card .submit-btn:hover {
                transform: translateY(-1px);
                background: #395230;
            }
            .page-body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #f4efe8 0%, #faf7f2 100%);
                margin: 0;
                padding: 24px;
            }
        </style>
    </head>

    <body class="page-body">
        <div class="message-card">
            <h1>Password Reset Complete</h1>
            <p>Your password has been updated successfully. You can now sign in with your new password.</p>
            <a href="{% url 'log_in' %}" class="submit-btn">Back to Sign In</a>
        </div>
    </body>

</html>
